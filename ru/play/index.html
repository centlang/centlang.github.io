<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Язык программирования Cent</title>
        <link rel="stylesheet" href="/static/style.css" />
        <link
            href="https://fonts.googleapis.com/css?family=JetBrains Mono"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <a href="/ru/">
                <img class="icon" src="/static/icon.svg" alt="Cent icon" />
            </a>
            <nav>
                <a class="nav-link" href="/ru/docs/"
                    >Документация</a
                >
                <a class="nav-link" href="/ru/play/"
                    >Песочница</a
                >
                <a class="nav-link" href="/ru/news/"
                    >Новости</a
                >
                <a class="nav-link" href="https://github.com/centlang/cent"
                    >GitHub</a
                >
            </nav>
        </header>
        <main>

<div class="playground-wrapper">
    <div class="toolbar">
        <div class="toolbar-left">
            <select id="compilation-mode">
                <option value="debug">Debug</option>
                <option value="release">Release</option>
            </select>
            <select>
                <option>centc v0.1</option>
            </select>
        </div>
        <div class="toolbar-right">
            <div class="share-wrapper">
                <button onclick="shareSnippet()">Поделиться</button>
                <div class="panel share-menu" id="share-menu">
                    <div class="share-menu-title-bar">
                        <button
                            onclick="closeShareMenu()"
                            class="share-menu-close"
                            id="share-menu-close"
                        >
                            <img
                                class="share-menu-close-icon"
                                src="/static/close.svg"
                                alt="Close icon"
                            />
                        </button>
                    </div>
                    <div class="share-menu-content">
                        <div class="snippet-qr" id="snippet-qr"></div>
                        <a id="snippet-url" target="_blank"></a>
                    </div>
                </div>
            </div>
            <button onclick="runCode()">Запустить</button>
        </div>
    </div>
    <div class="editor-wrapper panel">
        <div class="lines" id="lines" translate="no">1</div>
        <div class="editor">
            <textarea
                class="editor-textarea"
                id="editor-textarea"
                autocapitalize="none"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                translate="no"
            ></textarea>
            <pre class="editor-pre" id="editor-pre" translate="no"></pre>
        </div>
    </div>
    <div class="output-wrapper panel">
        <div id="cf-turnstile"></div>
        <img
            class="loading"
            id="loading"
            src="/static/loading.svg"
            alt="Loading icon"
        />
        <div translate="no">
            <p id="stderr"></p>
            <p id="stdout">Вывод</p>
        </div>
        <p class="muted" id="system"></p>
    </div>
    <div id="error-container" class="error-container"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
    defer
></script>
<script src="/static/playground.js"></script>
</main>
        <footer>
            <p class="muted">© 2026 lnkrr</p>
        </footer>
        <script src="/static/main.js"></script>
    </body>
</html>
