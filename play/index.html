<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=0.6" />
        <title>Cent Programming Language</title>
        <link rel="stylesheet" href="/static/style.css" />
        <link rel="stylesheet" href="/static/syntax.css" />
        <link
            href="https://fonts.googleapis.com/css?family=JetBrains Mono"
            rel="stylesheet"
        />
    </head>
    <body>
        <header class="panel">
            <a href="/">
                <img class="icon" src="/static/icon.svg" />
            </a>
            <nav>
                <a class="nav-link" href="/docs/">Docs</a>
                <a class="nav-link" href="/news/">News</a>
                <a class="nav-link" href="https://github.com/centlang/cent"
                    >GitHub</a
                >
            </nav>
        </header>
        <main>

<div class="playground-wrapper">
    <div class="toolbar">
        <div class="toolbar-left">
            <select>
                <option>Debug</option>
                <option>Release</option>
            </select>
            <select>
                <option>centc v0.001</option>
            </select>
        </div>
        <button>Run</button>
    </div>
    <div class="editor-wrapper" id="editor-wrapper">
        <div class="lines" id="lines">1</div>
        <textarea
            class="editor"
            id="editor"
            autocapitalize="none"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
        >
with std::io;

fn main() {
    io::println("Hello, world!");
}</textarea
        >
    </div>
    <span class="output"></span>
</div>
<script src="/static/playground.js"></script>
</main>
        <footer>
            <span class="muted">© 2025 lnkrr</span>
        </footer>
    </body>
</html>
